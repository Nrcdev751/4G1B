include:
  - ./db.yaml
services:
  s3app:
    image: prawee/strapi
    container_name: 68-s3-4G1B-app
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_NAME: "${DATABASE_NAME}"
      DATABASE_HOST: s3db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: "${DATABASE_USER}"
      DATABASE_PASSWORD: "${DATABASE_PASS}"
    depends_on:
      - s3db    
    ports:
      - "${APPLICATION_PORT}:1337"
