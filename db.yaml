services:
  s3db:
    image: postgres:latest
    container_name: 68-s3-4G1B-database
    environment:
      POSTGRES_USER: "${DATABASE_USER}"
      POSTGRES_PASSWORD: "${DATABASE_PASS}"
      POSTGRES_DB: "${DATABASE_NAME}"
    volumes:
      - /postgres_data:/var/lib/postgresql
    ports:
      - "${DATABASE_PORT}:5432"
volumes:
  postgres_data:
