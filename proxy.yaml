services:
  caddy:
    image: caddy:latest
    container_name: 68-s3-4G1B-caddy
    restart: unless-stopped
    ports:
      - "80:80"   
      - "443:443" 
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile  
      - caddy_data:/data      
      - caddy_config:/config
    depends_on:
      - pgadmin
      - s3app

volumes:
  caddy_data:
  caddy_config:
